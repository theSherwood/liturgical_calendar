# ─────────────────────────────────────────────────────────────────────────────
# This file lives in .github/workflows_src/ (a normal, pushable path) because the
# automation credential can't write to .github/workflows/ without the `workflow`
# OAuth scope. To ACTIVATE it, copy this directory into place from a machine whose
# git has that scope (or via GitHub's web UI):
#
#     cp -r .github/workflows_src/. .github/workflows/
#     git add .github/workflows && git commit -m "Activate Pages deploy" && git push
#
# Re-run that copy whenever this source changes.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy calendar to GitHub Pages

on:
  # Rebuild whenever the content or code changes.
  push:
    branches: [main]

  # Also rebuild on a schedule — NOT redundant with the push trigger. The site is
  # a *static* build, but its output depends on the current date: the "Today" and
  # "On the horizon" panels and the "current year" view are all computed with the
  # build-time date. Between pushes (which may be weeks apart) those would freeze
  # and, at New Year, the whole year view would lag until someone pushed. A daily
  # build keeps them accurate on their own. (If we ever compute "Today" in the
  # browser instead, this can drop to a yearly run that just rolls the .ics
  # horizon forward.)
  schedule:
    - cron: "17 6 * * *"

  # And on demand.
  workflow_dispatch:

# Least-privilege token that can publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer build supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Site + feed are required — fail the build if either breaks.
      - name: Build site and .ics feed
        run: |
          npx tsx src/build.ts --only=ics
          npx tsx src/build.ts --only=web

      # PDF needs headless Chromium; treat it as best-effort so a Chromium hiccup
      # never blocks the dashboard + feed from deploying.
      - name: Build printable PDF (best effort)
        continue-on-error: true
        run: |
          npx puppeteer browsers install chrome || true
          npx tsx src/build.ts --only=pdf

      # Assemble a single publish directory: the site at the root, with the .ics
      # and PDF alongside it at /calendar.ics and /calendar.pdf.
      - name: Assemble publish directory
        run: |
          mkdir -p public
          cp -r dist/site/. public/
          cp dist/calendar.ics public/ 2>/dev/null || echo "no .ics"
          cp dist/calendar.pdf public/ 2>/dev/null || echo "no PDF (best-effort step skipped)"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
